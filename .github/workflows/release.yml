name: Release

on:
  push:
    tags: ['v*']

permissions:
  id-token: write
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node: [20]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - name: Remove project .npmrc
        run: rm -f .npmrc
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            arch: x64
            ext: tar.gz
          - os: ubuntu-latest
            target: linux-arm64
            arch: arm64
            ext: tar.gz
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
            ext: tar.gz
          - os: macos-latest
            target: darwin-x64
            arch: x64
            ext: tar.gz
          - os: windows-latest
            target: windows-x64
            arch: x64
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm ci --omit=dev

      - name: Create wrapper scripts
        shell: bash
        run: |
          mkdir -p staging/bin staging/dist
          cp -r dist/* staging/dist/
          cp -r node_modules staging/node_modules

          printf '#!/usr/bin/env bash\nDIR="$(cd "$(dirname "$0")/.." && pwd)"\nexec node "$DIR/dist/cli.js" "$@"\n' > staging/bin/agent-bridge
          chmod +x staging/bin/agent-bridge

          printf '@echo off\r\nnode "%%~dp0\\..\\dist\\cli.js" %%*\r\n' > staging/bin/agent-bridge.cmd

      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          tar -czf agent-bridge-${{ matrix.target }}.tar.gz -C staging .

      - name: Package (zip)
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          cd staging && 7z a -tzip ../agent-bridge-${{ matrix.target }}.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: agent-bridge-${{ matrix.target }}
          path: agent-bridge-${{ matrix.target }}.${{ matrix.ext }}

  github-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
